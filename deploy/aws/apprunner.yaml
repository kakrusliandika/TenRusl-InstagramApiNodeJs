version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm ci --omit=optional
run:
  command: node src/server.js
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: APP_MODE
      value: official
    - name: SCRAPER_ENABLED
      value: "false"
    - name: API_KEY_ENABLED
      value: "true"
