# Templat: ganti PROJECT_ID, tag citra, rahasia, dan IG_PROVIDER sebelum menerapkan ke Cloud Run.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
    name: tenrusl-instagram-api
spec:
    template:
        spec:
            containers:
                - image: gcr.io/PROJECT_ID/tenrusl-instagram-api:latest
                  ports:
                      - containerPort: 3000
                  env:
                      - name: NODE_ENV
                        value: production
                      - name: IG_PROVIDER
                        value: mock
                      - name: API_KEY_ENABLED
                        value: "true"
                      - name: API_KEY
                        value: set_in_secret_manager
                      - name: CORS_ORIGIN
                        value: https://your-domain.example
                      - name: RATE_LIMIT_ENABLED
                        value: "true"
                      - name: RATE_LIMIT_WINDOW_MS
                        value: "60000"
                      - name: RATE_LIMIT_MAX
                        value: "120"
                      - name: BODY_LIMIT
                        value: 256kb
                      - name: PROVIDER_REQUEST_TIMEOUT_MS
                        value: "10000"
                      - name: META_GRAPH_BASE_URL
                        value: https://graph.facebook.com
                      - name: META_API_VERSION
                        value: v23.0
                      - name: META_ACCESS_TOKEN
                        value: set_in_secret_manager
                      - name: META_IG_USER_ID
                        value: set_in_secret_manager
                      - name: PUBLIC_DATA_ENABLED
                        value: "false"
                      - name: PUBLIC_DATA_UPSTREAM_URL
                        value: ""
                      - name: AUTHORIZED_PROVIDER_ENABLED
                        value: "false"
                      - name: AUTHORIZED_SESSION_TOKEN
                        value: set_in_secret_manager
                      - name: AUTHORIZED_INTEGRATION_REVIEWED
                        value: "false"
