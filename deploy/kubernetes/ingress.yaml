# Templat: ganti host, TLS, dan anotasi ingress sesuai cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: tenrusl-instagram-api
spec:
    rules:
        - host: api.example.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: tenrusl-instagram-api
                            port:
                                number: 80
