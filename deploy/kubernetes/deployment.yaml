apiVersion: apps/v1
kind: Deployment
metadata:
    name: tenrusl-instagram-api
spec:
    replicas: 2
    selector:
        matchLabels:
            app: tenrusl-instagram-api
    template:
        metadata:
            labels:
                app: tenrusl-instagram-api
        spec:
            containers:
                - name: api
                  image: tenrusl-instagram-api:production
                  ports:
                      - containerPort: 3000
                  env:
                      - name: NODE_ENV
                        value: production
                      - name: IG_PROVIDER
                        value: mock
                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 3000
                  livenessProbe:
                      httpGet:
                          path: /live
                          port: 3000
