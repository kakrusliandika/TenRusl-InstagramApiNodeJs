# Templat Secret. Ganti nilai memakai pengelola rahasia; jangan masukkan rahasia asli ke kontrol versi.
apiVersion: v1
kind: Secret
metadata:
    name: tenrusl-instagram-api-secrets
type: Opaque
stringData:
    API_KEY: set_in_kubernetes_or_external_secret_manager
    META_ACCESS_TOKEN: set_in_kubernetes_or_external_secret_manager
    META_IG_USER_ID: set_in_kubernetes_or_external_secret_manager
    AUTHORIZED_SESSION_TOKEN: set_in_kubernetes_or_external_secret_manager
