<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TenRusl Instagram API Gateway v4.0.0</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 48px; background: #0b1020; color: #f8fafc; }
      main { max-width: 900px; margin: auto; }
      code { background: #111827; padding: 2px 6px; border-radius: 6px; }
      a { color: #93c5fd; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 24px; }
      .card { border: 1px solid #1f2937; background: #111827; padding: 16px; border-radius: 14px; }
      .meta { color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main>
      <h1>TenRusl Instagram API Gateway</h1>
      <p class="meta">Version 4.0.0. Express ESM API gateway with mock, official, public, and authorized provider boundaries.</p>
      <div class="grid">
        <div class="card"><strong>Health</strong><br /><code>/health</code></div>
        <div class="card"><strong>Ready</strong><br /><code>/ready</code></div>
        <div class="card"><strong>Live</strong><br /><code>/live</code></div>
        <div class="card"><strong>Metrics</strong><br /><code>/metrics</code></div>
        <div class="card"><strong>Capabilities</strong><br /><code>/capabilities</code></div>
        <div class="card"><strong>V1 API</strong><br /><code>/v1</code></div>
        <div class="card"><strong>Profile</strong><br /><code>/v1/get/profiles/:identifier</code></div>
      </div>
    </main>
  </body>
</html>
