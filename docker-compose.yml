services:
  instagram-api:
    build: .
    image: tenrusl-instagram-api:production
    env_file:
      - .env.example
    environment:
      NODE_ENV: production
      IG_PROVIDER: mock
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
