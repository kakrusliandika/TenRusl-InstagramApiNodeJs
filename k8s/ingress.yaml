apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenrusl-instagram-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "128k"
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tenrusl-instagram-api
                port:
                  number: 80
